<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Scale Quiz</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #5b21b6, #db2777, #2563eb);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      background: white;
      width: 100%;
      max-width: 720px;
      border-radius: 28px;
      padding: 36px;
      text-align: center;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.25);
    }

    h1 {
      font-size: 40px;
      color: #1f2937;
      margin-bottom: 16px;
    }

    h2 {
      font-size: 30px;
      color: #1f2937;
      margin-bottom: 28px;
    }

    p {
      color: #4b5563;
      font-size: 18px;
      margin-bottom: 24px;
    }

    .qr {
      width: 250px;
      height: 250px;
      border: 5px solid #7c3aed;
      border-radius: 20px;
      margin-bottom: 28px;
    }

    .button {
      border: none;
      background: #7c3aed;
      color: white;
      font-size: 18px;
      font-weight: bold;
      padding: 16px 32px;
      border-radius: 18px;
      cursor: pointer;
      transition: 0.25s ease;
    }

    .button:hover {
      background: #6d28d9;
      transform: scale(1.04);
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 36px;
    }

    .progress-fill {
      height: 100%;
      background: #7c3aed;
      width: 0%;
      transition: width 0.4s ease;
    }

    .scale-buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .scale-button {
      border: none;
      border-radius: 18px;
      padding: 28px 0;
      font-size: 28px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      transition: 0.25s ease;
    }

    .scale-button:hover {
      transform: scale(1.08);
    }

    .scale-labels {
      display: flex;
      justify-content: space-between;
      color: #6b7280;
      font-size: 14px;
    }

    .score-box {
      background: linear-gradient(90deg, #7c3aed, #ec4899);
      color: white;
      font-size: 70px;
      font-weight: bold;
      padding: 36px;
      border-radius: 28px;
      margin: 28px 0;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.2);
    }

    .summary {
      background: #f3f4f6;
      border-radius: 20px;
      padding: 20px;
      text-align: left;
      margin-bottom: 28px;
    }

    .summary h3 {
      color: #374151;
      margin-bottom: 14px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 8px;
      color: #374151;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 600px) {
      .app {
        padding: 24px;
      }

      h1 {
        font-size: 30px;
      }

      h2 {
        font-size: 24px;
      }

      .scale-buttons {
        grid-template-columns: 1fr;
      }

      .score-box {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="startScreen">
      <h1>QR Scale Quiz</h1>
      <p>Participants scan the QR code to start answering the 10 questions.</p>

      <img
        class="qr"
        id="qrImage"
        src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=https://your-github-page-url.com"
        alt="QR Code"
      />

      <br />
      <button class="button" onclick="startQuiz()">Start Quiz</button>
    </section>

    <section id="quizScreen" class="hidden">
      <div class="progress-info">
        <span id="questionCounter">Question 1 / 10</span>
        <span id="questionPercent">10%</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <h2 id="questionText"></h2>

      <div class="scale-buttons" id="scaleButtons"></div>

      <div class="scale-labels">
        <span>Low</span>
        <span>High</span>
      </div>
    </section>

    <section id="resultScreen" class="hidden">
      <div style="font-size: 60px;">🏆</div>
      <h1>Final Score</h1>

      <div class="score-box" id="finalScore"></div>

      <div class="summary">
        <h3>Answer Summary</h3>
        <div id="answerSummary"></div>
      </div>

      <button class="button" onclick="restartQuiz()">Restart Quiz</button>
    </section>
  </div>

  <script>
    const questions = [
      "How satisfied are you with the event organization?",
      "How clear was the communication before the event?",
      "How useful was the content presented?",
      "How engaging were the activities?",
      "How likely are you to recommend this experience?",
      "Rate the quality of the facilitators.",
      "How interactive was the session?",
      "How valuable was the information shared?",
      "How easy was it to participate?",
      "Overall experience rating."
    ];

    let currentQuestion = 0;
    let answers = [];

    const startScreen = document.getElementById("startScreen");
    const quizScreen = document.getElementById("quizScreen");
    const resultScreen = document.getElementById("resultScreen");
    const questionText = document.getElementById("questionText");
    const questionCounter = document.getElementById("questionCounter");
    const questionPercent = document.getElementById("questionPercent");
    const progressFill = document.getElementById("progressFill");
    const scaleButtons = document.getElementById("scaleButtons");
    const finalScore = document.getElementById("finalScore");
    const answerSummary = document.getElementById("answerSummary");

    function startQuiz() {
      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
    }

    function showQuestion() {
      questionText.textContent = questions[currentQuestion];

      const questionNumber = currentQuestion + 1;
      const percent = Math.round((questionNumber / questions.length) * 100);

      questionCounter.textContent = `Question ${questionNumber} / ${questions.length}`;
      questionPercent.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;

      scaleButtons.innerHTML = "";

      for (let i = 1; i <= 5; i++) {
        const button = document.createElement("button");
        button.className = "scale-button";
        button.textContent = i;
        button.onclick = () => selectAnswer(i);
        scaleButtons.appendChild(button);
      }
    }

    function selectAnswer(value) {
      answers.push(value);

      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const total = answers.reduce((sum, value) => sum + value, 0);
      const maxPossible = questions.length * 5;
      const scoreOutOfTen = ((total / maxPossible) * 10).toFixed(1);

      finalScore.textContent = `${scoreOutOfTen} / 10`;
      answerSummary.innerHTML = "";

      answers.forEach((answer, index) => {
        const row = document.createElement("div");
        row.className = "summary-row";
        row.innerHTML = `<span>Question ${index + 1}</span><strong>${answer}/5</strong>`;
        answerSummary.appendChild(row);
      });
    }

    function restartQuiz() {
      currentQuestion = 0;
      answers = [];
      resultScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
    }
  </script>
</body>
</html>
